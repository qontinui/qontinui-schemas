name: Rust CI

# Workspace-wide build / test / lint / fmt for the Rust crates in this repo.
# Triggered on PRs and on push to main; path-filtered so non-Rust changes
# don't burn CI minutes. The `workflow_call` trigger lets publish-rust.yml
# (F2 hard gate, per qontinui-dev-notes/rust-release-engineering) reuse the
# same job and require it green for the tagged commit before publishing.

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust/**"
      - "rust-runner-client/**"
      - ".github/workflows/rust-ci.yml"
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust/**"
      - "rust-runner-client/**"
      - ".github/workflows/rust-ci.yml"
  workflow_call:

jobs:
  rust-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace
