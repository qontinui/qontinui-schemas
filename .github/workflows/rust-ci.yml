name: Rust CI

# Workspace-wide build / test / lint / fmt for the Rust crates in this repo.
#
# Triggers:
#   pull_request: every PR (no path filter). GitHub branch-protection
#     'required check' rules look for check-runs created by the
#     pull_request event; a path-filtered trigger that doesn't fire
#     (e.g. workflow-only edits or the release-please bot's PR) leaves
#     the required check 'missing' and the PR fails the rule with no
#     way to satisfy it short of admin bypass. Running the full
#     compile/test on every PR is the only mechanism that posts the
#     required status reliably; the Swatinem rust-cache makes
#     no-Rust-change PRs fast.
#   push: only when Rust sources actually change — main pushes that
#     don't touch Rust don't need to re-run.
#   workflow_dispatch: manual escape hatch.
#   workflow_call: lets publish-rust.yml (F2 hard gate, per
#     qontinui-dev-notes/rust-release-engineering) reuse this job and
#     require it green for the tagged commit before publishing.

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust/**"
      - "rust-runner-client/**"
      - ".github/workflows/rust-ci.yml"
  workflow_dispatch:
  workflow_call:

jobs:
  rust-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace
