name: schema-drift

# Fails CI when the generated TypeScript or Python type bindings under
# qontinui-schemas/ are out of sync with the Rust sources that drive them.
#
# Trigger scope: this side catches drift introduced by changes to
# qontinui-schemas's own Rust sources. The mirror workflow in
# qontinui-runner (`qontinui-types-drift.yml`) catches drift introduced
# by changes to runner-side schema files (`src-tauri/src/schema_export.rs`,
# `tauri_event_payloads.rs`, `relay_envelopes.rs`, `scripts/generate_types.sh`).
# Together they form a two-sided gate around the cross-repo codegen
# contract.
#
# qontinui-schemas is a standalone repo; this workflow recreates the
# sibling layout (qontinui-schemas/ + qontinui-runner/ at $GITHUB_WORKSPACE)
# that generate_types.sh and the runner crate's path-deps expect.

on:
  # Manual trigger: useful when a cross-repo coordination fix lands on
  # qontinui-runner main but nothing on qontinui-schemas main has
  # touched rust/src/** since — the workflow's last main run can stay
  # cosmetically red for a long stretch even though the underlying
  # drift is fixed. `gh workflow run schema-drift.yml --ref main`
  # refreshes the visible status without forcing a noop rust/src/**
  # commit.
  workflow_dispatch:
    inputs:
      # Manual dispatch already runs check-consumers fully (see the
      # early-exit step: dispatch is treated as an explicit ask), so
      # today this input is a belt-and-braces override. It exists so
      # the consumer gate can always be exercised post-merge without a
      # rust/src/** commit even if the dispatch path is ever tightened,
      # e.g. `gh workflow run schema-drift.yml --ref main -f force_consumers=true`.
      # On push/pull_request events the input is absent (empty string)
      # and the gate logic treats it as false — behavior unchanged.
      force_consumers:
        description: "Force the check-consumers compile gate to run fully"
        type: boolean
        required: false
        default: false
  push:
    branches: [main]
    paths:
      - "rust/src/**"
  pull_request:
    branches: [main]
    # No path filter on the PR trigger so the `check-drift` required-check
    # status posts on every PR. Required-check rules look for check-runs
    # created by the pull_request event; a path-filtered trigger that
    # doesn't fire (e.g. the release-please bot's PR, which only touches
    # rust/Cargo.toml + rust/CHANGELOG.md, not rust/src/**) leaves the
    # required check in the "missing" state and the PR fails the rule
    # with no way to satisfy it short of admin bypass. Running the full
    # regen on every PR is ~2 min wasted on irrelevant PRs but is the
    # only mechanism that posts the required status. PRs without
    # rust/src/** changes will produce no diff and pass quickly.

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          path: qontinui-schemas

      - name: Checkout qontinui-runner (sibling)
        uses: actions/checkout@v5
        with:
          repository: qontinui/qontinui-runner
          path: qontinui-runner

      # generate_types.sh runs `cargo build --bin export_schemas` which
      # links the runner lib (Tauri-dependent). Tauri 2.x on Linux probes
      # for libwebkit2gtk-4.1, libsoup, libgtk etc. via pkg-config in
      # build scripts. Without these, cargo aborts at link/probe time.
      # Mirrors the canonical list from qontinui-runner/.github/workflows/ci.yml.
      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            libatspi2.0-dev \
            at-spi2-core

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      # compile_typescript.mjs does `import { compile } from
      # 'json-schema-to-typescript'` from qontinui-schemas/scripts/.
      # Node ESM resolution walks up to qontinui-schemas/node_modules/,
      # so the package must be installed locally (a global -g install
      # is not in Node ESM's default resolution path). package-lock.json
      # is .gitignore'd, so `npm install` (not `npm ci`) — fresh resolve
      # from the registry each run. Acceptable here because the gate
      # only cares whether codegen output diffs, not pinned dep versions.
      - name: Install qontinui-schemas npm deps
        working-directory: qontinui-schemas
        run: npm install

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Pin datamodel-code-generator: each minor version tweaks Pydantic
      # output (e.g. 0.56→0.57 adds `from pydantic import Field` imports
      # to enum-only modules). Without a pin, every upstream release would
      # surface as fresh "drift" until someone regen'd locally with the
      # new version. Bump deliberately, not by accident.
      - name: Install datamodel-code-generator
        run: pip install 'datamodel-code-generator==0.57.0'

      # tauri_build::build() in qontinui-runner/src-tauri/build.rs reads
      # tauri.conf.json's `frontendDist: "../dist"` and panics if the path
      # doesn't exist. We don't actually need a real frontend build for
      # schema export — the export_schemas binary only touches Rust schemar
      # registries — so stub an empty dist/ with a placeholder index.html.
      # The build script's `tauri::generate_context!()` will embed the
      # placeholder, which is fine: the binary that reads the embedded
      # frontend (the actual runner) is never invoked here.
      - name: Stub qontinui-runner frontend dist
        run: |
          mkdir -p qontinui-runner/dist
          printf '<!DOCTYPE html><html><head></head><body>schema-drift CI stub</body></html>\n' > qontinui-runner/dist/index.html

      # CARGO_TARGET_DIR override: qontinui-runner is a workspace (Cargo.toml
      # at the runner root declares [workspace] members = ["src-tauri", ...]),
      # so cargo's default target-dir is qontinui-runner/target/. But
      # generate_types.sh:21 hardcodes
      # SCHEMAS_JSON="$PROJECT_ROOT/target/schemas.json" where
      # $PROJECT_ROOT = qontinui-runner/src-tauri/. Force cargo to write to
      # the script-expected per-package target dir so the bash redirection
      # on script line 73 finds an existing target/ parent.
      - name: Regenerate types
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/qontinui-runner/src-tauri/target
        run: bash qontinui-runner/src-tauri/scripts/generate_types.sh

      # `-I '^#   timestamp:'` ignores hunks whose only changed lines are the
      # `# timestamp: <ISO-8601>` header that datamodel-codegen writes at
      # the top of every generated Python file. Those timestamps update on
      # every codegen run regardless of whether the schema content changed,
      # so without this filter the workflow can never go green even on a
      # repo with no real drift. Same trick `schema-pg-sql-fresh.yml` uses
      # to ignore `-- Dumped by pg_dump version` header noise.
      - name: Check for drift
        working-directory: qontinui-schemas
        run: |
          if ! git diff --exit-code -I '^#   timestamp:' \
              ts/src/generated \
              src/qontinui_schemas/generated; then
            echo "::error::Generated types are out of date."
            echo "Run 'just generate-types' from the repo root and commit the updated files."
            exit 1
          fi

  # ------------------------------------------------------------------
  # check-consumers: downstream path-dep consumer compile gate.
  #
  # CONTRACT: a red check-consumers means this schema change breaks a
  # path-dep consumer's compile. Land the consumer catch-up PR together
  # with this change (schema lands -> catch-up lands immediately), or
  # fix the change. Do NOT merge over a red gate and leave the consumer
  # to discover the break on its own main.
  #
  # Why this exists: on 2026-07-05 a schemas change (v0.8.0 apps.rs —
  # new fields `update_strategy`/`build_command`/`start_command` plus
  # `AppError::InvalidUpdateStrategy`) landed with no runner catch-up.
  # qontinui-runner consumes qontinui-types via a path dependency
  # (src-tauri/Cargo.toml -> ../../qontinui-schemas/rust), so every
  # runner build immediately broke (E0063 x3, E0004), runner main went
  # red, and the runner merge train froze for ~60 hours with 8 green
  # PRs stuck. Plan: 2026-07-06-runner-ci-cross-repo-schema-drift-guard
  # (Phase 2 / design decision D1).
  #
  # Why `cargo check --workspace --all-targets` (load-bearing): the
  # check-drift job above builds only `--bin export_schemas`, which
  # links the runner *lib* only. The 2026-07-05 break lived in
  # bin-target code — the runner's `commands/` module is declared in
  # main.rs, not lib.rs — so a lib-only build stayed green while every
  # real runner build was red. `--all-targets` compiles bin + test
  # targets and closes exactly that blind spot.
  #
  # Consumer list is EXPLICIT: qontinui-runner is the only Rust
  # path-dep consumer today. When another repo gains a path dep on
  # qontinui-schemas/rust, add a sibling checkout + gated
  # `cargo check --workspace --all-targets` step pair for it here.
  #
  # Trigger/required-check convention (same as check-drift and
  # rust-ci.yml): the pull_request trigger carries NO paths: filter —
  # a path-filtered trigger that doesn't fire leaves a required check
  # "missing" and unsatisfiable. Instead the first step below computes
  # whether the PR touches rust/src/** and every heavy step is gated on
  # it, so irrelevant PRs go green in seconds. After this job's first
  # green run, register `check-consumers` in the schemas ruleset's
  # required checks (post-merge step — only require a context that has
  # a producer).
  # ------------------------------------------------------------------
  check-consumers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          path: qontinui-schemas
          # Full history so the early-exit step can diff the PR's
          # base...head range directly by sha.
          fetch-depth: 0

      # Early exit: only schema Rust source changes (rust/src/**) can
      # break a consumer's compile. Per event:
      #   pull_request      -> diff base..head; run only if rust/src/** changed
      #   push              -> run fully (trigger is already path-filtered)
      #   workflow_dispatch -> run fully (a manual dispatch is an
      #                        explicit ask; force_consumers=true keeps
      #                        that guaranteed even if this ever changes)
      # When run_gate=false every subsequent step is skipped and the
      # job completes green in seconds — that is what keeps the
      # unfiltered pull_request trigger cheap on irrelevant PRs.
      - name: Decide whether consumer compile gate must run
        id: gate
        working-directory: qontinui-schemas
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # Boolean workflow_dispatch input; empty string on push/PR
          # events — the :-false default below keeps those unchanged.
          FORCE_CONSUMERS: ${{ inputs.force_consumers }}
        run: |
          set -euo pipefail
          run_gate=false
          case "$EVENT_NAME" in
            pull_request)
              changed="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
              if printf '%s\n' "$changed" | grep -q '^rust/src/'; then
                run_gate=true
              fi
              ;;
            push|workflow_dispatch)
              run_gate=true
              ;;
          esac
          if [ "${FORCE_CONSUMERS:-false}" = "true" ]; then
            run_gate=true
          fi
          echo "run_gate=$run_gate" >> "$GITHUB_OUTPUT"
          echo "event=$EVENT_NAME run_gate=$run_gate"

      - name: Checkout qontinui-runner (sibling)
        if: steps.gate.outputs.run_gate == 'true'
        uses: actions/checkout@v5
        with:
          repository: qontinui/qontinui-runner
          path: qontinui-runner

      # Same dep list as check-drift above: Tauri 2.x on Linux probes
      # for libwebkit2gtk-4.1, libsoup, libgtk etc. via pkg-config in
      # build scripts. Without these, cargo aborts at link/probe time.
      # Mirrors the canonical list from qontinui-runner/.github/workflows/ci.yml.
      - name: Install Tauri Linux system deps
        if: steps.gate.outputs.run_gate == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev \
            libatspi2.0-dev \
            at-spi2-core

      - name: Set up Rust toolchain
        if: steps.gate.outputs.run_gate == 'true'
        uses: dtolnay/rust-toolchain@stable

      # Cache keyed on the RUNNER workspace (that is what we compile);
      # target dir is relative to the workspace root and must match the
      # CARGO_TARGET_DIR used by the check step below.
      - name: Rust cache (runner workspace)
        if: steps.gate.outputs.run_gate == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: qontinui-runner -> target-consumer-check

      # tauri_build::build() in qontinui-runner/src-tauri/build.rs reads
      # tauri.conf.json's `frontendDist: "../dist"` and panics if the path
      # doesn't exist. We don't actually need a real frontend build for
      # schema export — the export_schemas binary only touches Rust schemar
      # registries — so stub an empty dist/ with a placeholder index.html.
      # The build script's `tauri::generate_context!()` will embed the
      # placeholder, which is fine: the binary that reads the embedded
      # frontend (the actual runner) is never invoked here.
      - name: Stub qontinui-runner frontend dist
        if: steps.gate.outputs.run_gate == 'true'
        run: |
          mkdir -p qontinui-runner/dist
          printf '<!DOCTYPE html><html><head></head><body>schema-drift CI stub</body></html>\n' > qontinui-runner/dist/index.html

      # The actual gate. --all-targets is load-bearing (see the job
      # header comment): a lib-only check rebuilds the exact blind spot
      # that let the 2026-07-05 apps.rs break through — the runner's
      # commands/ module lives under the bin target (main.rs), not the
      # lib. The sibling layout above resolves the runner's
      # `../../qontinui-schemas/rust` path dep to THIS PR's schema.
      - name: cargo check qontinui-runner (all targets) against proposed schema
        if: steps.gate.outputs.run_gate == 'true'
        working-directory: qontinui-runner
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/qontinui-runner/target-consumer-check
        run: cargo check --workspace --all-targets
