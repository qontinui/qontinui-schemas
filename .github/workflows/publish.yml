name: Publish @qontinui/shared-types to npm

# Tag-triggered publish for the TypeScript package only.
# We use the `ts-v*` prefix so this workflow does not fire for any future
# Rust crate tag scheme (this repo also hosts the Rust `qontinui-types` crate).
#
# Uses npm Trusted Publishing (OIDC). No long-lived NPM_TOKEN — GitHub
# mints a short-lived OIDC JWT that npm verifies against the per-package
# trust policy configured at npmjs.com.
#
# To release: bump `ts/package.json` version, then:
#   git tag ts-v0.2.2
#   git push --tags
#
# One-time npmjs.com setup (per package, by an @qontinui maintainer):
#   npmjs.com → @qontinui/shared-types → Settings → Trusted Publisher →
#   Add: organization=qontinui, repository=qontinui-schemas,
#        workflow filename=publish.yml, environment=(blank).
on:
  push:
    tags:
      - 'ts-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # Required for npm trusted publishing — GitHub mints a short-lived
      # OIDC JWT that npm verifies against the per-package trust policy
      # configured at npmjs.com. No long-lived NPM_TOKEN secret needed.
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to 11.5.1+ for trusted publishing
        # actions/setup-node@v4 with node@20 ships npm@10.8.2, but npm
        # Trusted Publishers requires 11.5.1+. Without this, the publish
        # step sends an empty auth header and gets 404 even when the
        # OIDC + provenance flow succeeds.
        run: npm install --global npm@latest
        working-directory: .

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        # --provenance generates an attestation linking the npm tarball
        # back to this exact commit + workflow run, signed by the OIDC
        # token. Surfaces on the package's npm page under "Provenance".
        run: npm publish --access public --provenance
