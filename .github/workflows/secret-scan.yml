name: Secret Scan
on:
  pull_request:
permissions:
  contents: read
jobs:
  gitleaks:
    name: Gitleaks Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks (binary — the marketplace action requires a paid org license)
        run: |
          # Pinned: the anonymous /releases/latest probe gets rate-limited on
          # shared runners (empty tag_name -> bash -e abort). Bump deliberately.
          GL=8.30.1
          echo "gitleaks v${GL}"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL}/gitleaks_${GL}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --config .gitleaks.toml --redact --no-banner \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
