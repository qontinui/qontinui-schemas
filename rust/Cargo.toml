[package]
name = "qontinui-types"
version = "0.9.0"
description = "Canonical DTO types for Qontinui. Rust is the source of truth; TypeScript and Python are generated from JSON Schema emitted by schemars."
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
html-escape = "0.2"
unicode-normalization = "0.1"
sha2 = "0.10"
hex = "0.4"
serde_jcs = "0.1"
thiserror = "2"
